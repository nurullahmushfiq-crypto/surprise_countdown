
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎁 Something Special is Coming...</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top,#1d1d3a,#0b0b15,#000);
}

/* Animated Stars */
body::before{
    content:'';
    position:absolute;
    width:200%;
    height:200%;

    background-image:
    radial-gradient(white 1px, transparent 1px);

    background-size:40px 40px;

    opacity:.25;

    animation:starsMove 70s linear infinite;
}

@keyframes starsMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-700px);
    }
}

/* Floating Glow */
.glow{
    position:absolute;
    width:500px;
    height:500px;

    background:#00e5ff;

    border-radius:50%;

    filter:blur(180px);

    opacity:.12;

    animation:floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-50px);
    }
}

.container{
    position:relative;
    z-index:2;

    width:90%;
    max-width:800px;

    text-align:center;

    padding:60px;

    border-radius:30px;

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 0 40px rgba(0,229,255,.15),
    0 0 100px rgba(255,255,255,.05);
}

h1{
    color:white;
    font-size:3.5rem;

    margin-bottom:15px;

    text-shadow:
    0 0 15px white,
    0 0 30px #00e5ff;
}

.subtitle{
    color:#d0d0d0;
    letter-spacing:2px;
    margin-bottom:40px;
    font-size:1.1rem;
}

.timer{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.box{
    width:120px;
    padding:20px;

    border-radius:20px;

    background:rgba(255,255,255,.06);

    box-shadow:
    0 0 20px rgba(0,229,255,.2);

    backdrop-filter:blur(10px);
}

.number{
    color:white;
    font-size:2.5rem;
    font-weight:700;

    text-shadow:
    0 0 15px white,
    0 0 25px #00e5ff;
}

.label{
    color:#bdbdbd;
    font-size:.9rem;
    letter-spacing:2px;
}

.secret{
    margin-top:35px;

    color:#999;

    letter-spacing:5px;

    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        opacity:.4;
    }
    50%{
        opacity:1;
    }
}

#message{
    margin-top:30px;
    font-size:2rem;
    color:white;
}

@media(max-width:700px){

.container{
    padding:30px;
}

h1{
    font-size:2rem;
}

.box{
    width:90px;
}

.number{
    font-size:1.8rem;
}
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="container">

    <h1>🎁 Something Special is Coming...</h1>

    <div class="subtitle">
          Dhoirjo rakhen apu ... 
    </div>

    <div class="timer">

        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">DAYS</div>
        </div>

        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">HOURS</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">MINUTES</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">SECONDS</div>
        </div>

    </div>

    <div class="secret">
        ✨ KEEP WAITING ✨
    </div>

    <div id="message"></div>

</div>

<script>

const targetDate =
new Date("June 12, 2026 15:00:00").getTime();

const countdown = setInterval(() => {

    const now = new Date().getTime();

    const distance = targetDate - now;

    const days =
    Math.floor(distance / (1000*60*60*24));

    const hours =
    Math.floor((distance % (1000*60*60*24))
    / (1000*60*60));

    const minutes =
    Math.floor((distance % (1000*60*60))
    / (1000*60));

    const seconds =
    Math.floor((distance % (1000*60))
    / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if(distance < 0){

        clearInterval(countdown);

        document.querySelector(".timer").style.display =
        "none";

        document.querySelector(".secret").style.display =
        "none";

        document.getElementById("message").innerHTML =
        "💖 The Wait Is Finally Over 💖";
    }

},1000);

</script>

</body>
</html>
